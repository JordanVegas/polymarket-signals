name: Clear Prod Polysignals Logs

on:
  workflow_dispatch:

jobs:
  clear-logs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: market-intelligence
            host: 139.59.0.218
            unit: market-intelligence
          - name: app-execution
            host: 64.227.130.117
            unit: app-execution
    steps:
      - name: Clear logs on ${{ matrix.name }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ matrix.host }}
          username: ${{ secrets.DROPLET_USER }}
          port: ${{ secrets.DROPLET_PORT }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DROPLET_APP_DIR }}"
            journalctl --rotate
            journalctl --vacuum-time=1s --unit=${{ matrix.unit }}
            find "$APP_DIR" -type f \( -name '*.log' -o -name '*.log.*' \) -delete || true
            journalctl --unit=${{ matrix.unit }} --no-pager -n 20 || true
