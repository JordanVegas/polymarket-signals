name: Deploy to Droplet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: market-intelligence
            env_file: .env.market-intelligence
            systemd_unit: market-intelligence
          - service_name: app-execution
            env_file: .env.app-execution
            systemd_unit: app-execution
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output=polymarket-signals.tar.gz HEAD

      - name: Upload archive to ${{ matrix.service_name }} droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ matrix.service_name == 'market-intelligence' && '139.59.0.218' || '64.227.130.117' }}
          username: ${{ secrets.DROPLET_USER }}
          port: ${{ secrets.DROPLET_PORT }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          source: polymarket-signals.tar.gz
          target: /tmp

      - name: Deploy ${{ matrix.service_name }} on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ matrix.service_name == 'market-intelligence' && '139.59.0.218' || '64.227.130.117' }}
          username: ${{ secrets.DROPLET_USER }}
          port: ${{ secrets.DROPLET_PORT }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DROPLET_APP_DIR }}"
            RELEASE_DIR=$(mktemp -d)
            APP_PARENT=$(dirname "$APP_DIR")
            RUNTIME_ENV_TMP=""
            mkdir -p "$APP_PARENT"
            tar -xzf /tmp/polymarket-signals.tar.gz -C "$RELEASE_DIR"
            if [ -f "$APP_DIR/${{ matrix.env_file }}" ]; then
              RUNTIME_ENV_TMP=$(mktemp)
              cp "$APP_DIR/${{ matrix.env_file }}" "$RUNTIME_ENV_TMP"
            fi
            cd "$RELEASE_DIR"
            npm ci
            npm run build
            rm -rf "${APP_DIR}.prev"
            if [ -d "$APP_DIR" ]; then
              mv "$APP_DIR" "${APP_DIR}.prev"
            fi
            mv "$RELEASE_DIR" "$APP_DIR"
            if [ -n "$RUNTIME_ENV_TMP" ]; then
              mv "$RUNTIME_ENV_TMP" "$APP_DIR/${{ matrix.env_file }}"
            fi
            systemctl restart ${{ matrix.systemd_unit }}
            systemctl status ${{ matrix.systemd_unit }} --no-pager --lines=20
