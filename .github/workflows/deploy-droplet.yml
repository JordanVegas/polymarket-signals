name: Deploy to Droplet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output=polymarket-signals.tar.gz HEAD

      - name: Upload archive to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          port: ${{ secrets.DROPLET_PORT }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          source: polymarket-signals.tar.gz
          target: /tmp

      - name: Deploy app on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          port: ${{ secrets.DROPLET_PORT }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DROPLET_APP_DIR }}"
            RELEASE_DIR=$(mktemp -d)
            APP_PARENT=$(dirname "$APP_DIR")
            mkdir -p "$APP_PARENT"
            tar -xzf /tmp/polymarket-signals.tar.gz -C "$RELEASE_DIR"
            if [ -f "$APP_DIR/.env" ]; then
              cp "$APP_DIR/.env" "$RELEASE_DIR/.env"
            fi
            cd "$RELEASE_DIR"
            npm ci
            npm run build
            rm -rf "${APP_DIR}.prev"
            if [ -d "$APP_DIR" ]; then
              mv "$APP_DIR" "${APP_DIR}.prev"
            fi
            mv "$RELEASE_DIR" "$APP_DIR"
            systemctl restart polysignals
            systemctl status polysignals --no-pager --lines=20
