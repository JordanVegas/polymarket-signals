name: Inspect Live Equity Gap Prod

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/inspect-live-equity-gap-prod.yml
      - scripts/inspect-live-equity-gap.mjs
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.DROPLET_SSH_KEY }}' > ~/.ssh/polysignals_key
          chmod 600 ~/.ssh/polysignals_key

      - name: Upload inspect script to droplet
        run: |
          scp \
            -P '${{ secrets.DROPLET_PORT }}' \
            -i ~/.ssh/polysignals_key \
            -o StrictHostKeyChecking=no \
            scripts/inspect-live-equity-gap.mjs \
            '${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/tmp/inspect-live-equity-gap.mjs'

      - name: Run inspect script on droplet
        run: |
          REPORT="$(ssh \
            -p '${{ secrets.DROPLET_PORT }}' \
            -i ~/.ssh/polysignals_key \
            -o StrictHostKeyChecking=no \
            '${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}' \
            \"set -euo pipefail; APP_DIR='${{ secrets.DROPLET_APP_DIR }}'; cd \\\"\\$APP_DIR\\\"; cp /tmp/inspect-live-equity-gap.mjs \\\"\\$APP_DIR/.inspect-live-equity-gap.mjs\\\"; set -a; . \\\"\\$APP_DIR/.env\\\"; set +a; node \\\"\\$APP_DIR/.inspect-live-equity-gap.mjs\\\" --username tuf; rm -f \\\"\\$APP_DIR/.inspect-live-equity-gap.mjs\\\"\")"
          printf '%s\n' "$REPORT" > equity-gap-report.json
          cat equity-gap-report.json

      - name: Publish report to job summary
        run: |
          {
            echo '## Live equity gap report'
            echo
            echo '```json'
            cat equity-gap-report.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish concise report as commit comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const report = JSON.parse(fs.readFileSync("equity-gap-report.json", "utf8"));
            const lines = [
              "Live equity gap summary",
              "",
              `App equity: $${report.summary.appEquityUsd}`,
              `Polymarket portfolio value: $${report.summary.publicPortfolioValueUsd}`,
              `Difference: $${report.summary.differenceUsd}`,
              `DB open positions: ${report.summary.dbOpenPositionCount}`,
              `Tracked but not public: ${report.summary.trackedButNotPublicCount}`,
              `Public but untracked: ${report.summary.publicButUntrackedCount}`,
            ];

            if (report.trackedButNotPublic.length > 0) {
              lines.push("");
              lines.push("Tracked but not public:");
              for (const row of report.trackedButNotPublic.slice(0, 5)) {
                lines.push(`- ${row.marketSlug} / ${row.outcome}: $${row.appValueUsd}`);
              }
            }

            if (report.publicButUntracked.length > 0) {
              lines.push("");
              lines.push("Public but untracked:");
              for (const row of report.publicButUntracked.slice(0, 5)) {
                lines.push(`- ${row.marketSlug} / ${row.outcome}: size ${row.size}`);
              }
            }

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: lines.join("\n"),
            });
