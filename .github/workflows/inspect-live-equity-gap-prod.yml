name: Inspect Live Equity Gap Prod

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/inspect-live-equity-gap-prod.yml
      - scripts/inspect-live-equity-gap.mjs
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload inspect script to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          port: ${{ secrets.DROPLET_PORT }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          source: scripts/inspect-live-equity-gap.mjs
          target: /tmp/polysignals-inspect-equity-gap

      - name: Run inspect script on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          port: ${{ secrets.DROPLET_PORT }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DROPLET_APP_DIR }}"
            cd "$APP_DIR"
            cp /tmp/polysignals-inspect-equity-gap/scripts/inspect-live-equity-gap.mjs "$APP_DIR/.inspect-live-equity-gap.mjs"
            set -a
            . "$APP_DIR/.env"
            set +a
            node "$APP_DIR/.inspect-live-equity-gap.mjs" --username tuf
            rm -f "$APP_DIR/.inspect-live-equity-gap.mjs"
