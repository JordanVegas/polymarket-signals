name: Inspect Live Equity Gap Prod

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.DROPLET_SSH_KEY }}' > ~/.ssh/polysignals_key
          chmod 600 ~/.ssh/polysignals_key

      - name: Upload inspect script to droplet
        run: |
          scp \
            -P '${{ secrets.DROPLET_PORT }}' \
            -i ~/.ssh/polysignals_key \
            -o StrictHostKeyChecking=no \
            scripts/inspect-live-equity-gap.mjs \
            '${{ secrets.DROPLET_USER }}@64.227.130.117:/tmp/inspect-live-equity-gap.mjs'

      - name: Run inspect script on droplet
        run: |
          REPORT="$(ssh \
            -p '${{ secrets.DROPLET_PORT }}' \
            -i ~/.ssh/polysignals_key \
            -o StrictHostKeyChecking=no \
            '${{ secrets.DROPLET_USER }}@64.227.130.117' \
            "APP_DIR='${{ secrets.DROPLET_APP_DIR }}' bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_DIR"
          cp /tmp/inspect-live-equity-gap.mjs "$APP_DIR/.inspect-live-equity-gap.mjs"
          set -a
          . <(tr -d '\r' < "$APP_DIR/.env.app-execution")
          set +a
          node "$APP_DIR/.inspect-live-equity-gap.mjs" --username tuf
          rm -f "$APP_DIR/.inspect-live-equity-gap.mjs"
          EOF
          )"
          printf '%s\n' "$REPORT" > equity-gap-report.json
          cat equity-gap-report.json

      - name: Publish report to job summary
        run: |
          {
            echo '## Live equity gap report'
            echo
            echo '```json'
            cat equity-gap-report.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
