name: Create Prod Auth User

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/create-prod-auth-user.yml
      - scripts/create-prod-auth-user.mjs
  workflow_dispatch:

jobs:
  create-user:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload auth user script to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          port: ${{ secrets.DROPLET_PORT }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          source: scripts/create-prod-auth-user.mjs
          target: /tmp/polysignals-auth-user

      - name: Create auth user on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          port: ${{ secrets.DROPLET_PORT }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DROPLET_APP_DIR }}"
            cd "$APP_DIR"
            cp /tmp/polysignals-auth-user/scripts/create-prod-auth-user.mjs "$APP_DIR/.create-prod-auth-user.mjs"
            set -a
            . "$APP_DIR/.env"
            set +a
            node "$APP_DIR/.create-prod-auth-user.mjs" --username idani --password Abhmkyhrx
            rm -f "$APP_DIR/.create-prod-auth-user.mjs"
