name: Sync Live Strategies Prod

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload sync script to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 64.227.130.117
          username: ${{ secrets.DROPLET_USER }}
          port: ${{ secrets.DROPLET_PORT }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          source: scripts/sync-live-edge-swing-positions.mjs
          target: /tmp/polysignals-sync

      - name: Run sync on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 64.227.130.117
          username: ${{ secrets.DROPLET_USER }}
          port: ${{ secrets.DROPLET_PORT }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DROPLET_APP_DIR }}"
            cd "$APP_DIR"
            cp /tmp/polysignals-sync/scripts/sync-live-edge-swing-positions.mjs "$APP_DIR/.sync-live-edge-swing-positions.mjs"
            set -a
            . <(tr -d '\r' < "$APP_DIR/.env.app-execution")
            set +a
            if [ -n '${{ secrets.PROD_MONGO_URI }}' ]; then
              export MONGO_URI='${{ secrets.PROD_MONGO_URI }}'
            fi
            if [ -n '${{ secrets.PROD_MONGO_DB_NAME }}' ]; then
              export MONGO_DB_NAME='${{ secrets.PROD_MONGO_DB_NAME }}'
            fi
            node "$APP_DIR/.sync-live-edge-swing-positions.mjs"
            rm -f "$APP_DIR/.sync-live-edge-swing-positions.mjs"
